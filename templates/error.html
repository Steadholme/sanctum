<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>{{STATUS}} · Sanctum · Steadholme</title>
  <style>{{CSS}}</style>
</head>
<body class="page-console">
  <header class="topbar">
    <div class="topbar__inner">
      <a class="brand" href="/" aria-label="Steadholme Sanctum">
        <span class="brand__glyph" aria-hidden="true">{{SHIELD}}</span>
        <span class="brand__word">Steadholme</span>
      </a>
      <div class="topbar__right">{{USERBOX}}</div>
    </div>
  </header>

  <main class="console console--narrow">
    <section class="card card--message">
      <div class="card__body">
        <div class="status-code">{{STATUS}}</div>
        <h1 class="message-heading">{{HEADING}}</h1>
        <p class="message-body">{{MESSAGE}}</p>
        <a class="btn btn-primary" href="/">Back to the vault</a>
      </div>
    </section>
  </main>
</body>
</html>
